name: Deploy API to Scaleway

on:
  push:
    branches:
      - master
    paths:
      - 'ui/**'
      - 'api/**'
      - 'backend-ts/**'
      - 'shared/**'
      - 'dataprep/**'
      - 'docker-compose.yml'
      - '.dockerignore'
      - 'Makefile'
      - '.github/workflows/deploy-api.yml'
      - '.github/workflows/deploy-ui.yml'
  workflow_dispatch:

jobs:
  build:
    name: Build and Deploy API
    runs-on: ubuntu-latest
    outputs:
      api_version: ${{ steps.api_version.outputs.api_version }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: backend-ts/package-lock.json

      - name: Check if API image is up to date
        id: image-check
        run: make api-image-check
        env:
          REGISTRY: ${{ secrets.REGISTRY }}
          DOCKER_USERNAME: nologin
          DOCKER_PASSWORD: ${{ secrets.SCW_SECRET_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          S3_DATAPREP_ACCESS_KEY: ${{ secrets.S3_DATAPREP_ACCESS_KEY }}
          S3_DATAPREP_SECRET_KEY: ${{ secrets.S3_DATAPREP_SECRET_KEY }}
        continue-on-error: true

      - name: Capture API version
        id: api_version
        run: echo "api_version=$(make api-version)" >> "$GITHUB_OUTPUT"

      - name: Download data and Build API
        run: make api-build-ci
        env:
          REGISTRY: ${{ secrets.REGISTRY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          S3_DATAPREP_ACCESS_KEY: ${{ secrets.S3_DATAPREP_ACCESS_KEY }}
          S3_DATAPREP_SECRET_KEY: ${{ secrets.S3_DATAPREP_SECRET_KEY }}
          API_VERSION: ${{ steps.api_version.outputs.api_version }}
        if: steps.image-check.outcome == 'failure'

      - name: Publish API docker image
        run: make api-image-publish
        env:
          REGISTRY: ${{ secrets.REGISTRY }}
          DOCKER_USERNAME: nologin
          DOCKER_PASSWORD: ${{ secrets.SCW_SECRET_KEY }}
          API_VERSION: ${{ steps.api_version.outputs.api_version }}
        if: steps.image-check.outcome == 'failure'

  deploy:
    name: Deploy API
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/master'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Use CLI
        uses: scaleway/action-scw@v0
        with:
          save-config: true
          export-config: true
          version: v2.24.0
          access-key: ${{ secrets.SCW_ACCESS_KEY }}
          secret-key: ${{ secrets.SCW_SECRET_KEY }}
          default-project-id: ${{ secrets.SCW_PROJECT_ID }}
          default-organization-id: ${{ secrets.SCW_ORGANIZATION_ID }}
  
      - name: Deploy API
        run: make deploy-api
        env:
          REGISTRY: ${{ secrets.REGISTRY }}
          API_VERSION: ${{ needs.build.outputs.api_version }}
