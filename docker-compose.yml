services:
  api:
    build:
      context: .
      dockerfile: backend-ts/Dockerfile
    image: ${REGISTRY}/${API_TS_IMAGE_NAME:-nc-chatbot-api-ts}:${API_TS_VERSION:-latest}
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      - PORT=8000
      - JWT_SECRET
      - JWT_EXPIRE
      - OPENAI_API_KEY
      - OPENAI_BASE_URL
      - TECH_DOCS_DIR
      - NC_DIR
      - RETRIEVAL_EMBEDDING_MODEL
    networks:
      - app-network

  ui:
    build:
      context: ./ui
      dockerfile: Dockerfile
    ports:
      - "${UI_PORT:-5177}:5173"
    volumes:
      - ./ui:/app
      - /app/node_modules
    environment:
      - VITE_API_URL
    networks:
      - app-network

  nginx:
    image: nginx:alpine
    ports:
      - "${NGINX_PORT:-8080}:80"
    volumes:
      - ./rpa/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - api
      - ui
    networks:
      - app-network

networks:
  app-network:
    driver: bridge 
